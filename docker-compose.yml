services:
  postgres:
    image: postgres:16-alpine
    container_name: refentra-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-refentra}
      TZ: ${DB_TIMEZONE:-Asia/Seoul}
    volumes:
      - refentra-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-refentra}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  refentra-postgres-data:
